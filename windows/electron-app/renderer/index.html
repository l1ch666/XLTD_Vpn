<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self';">
  <title>XLTD VPN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── Custom title bar ── -->
  <div id="titlebar">
    <div class="brand">
      <div class="brand-icon">◉</div>
      <span class="brand-name">XLTD VPN</span>
      <span class="brand-ver" id="appVer">v0.6.0-beta</span>
    </div>
    <div class="center-label" id="titleCenter">WIN-X64</div>
    <div class="win-ctrls">
      <button onclick="api.minimize()" title="Minimize">─</button>
      <button onclick="api.maximize()" title="Maximize">□</button>
      <button class="close" onclick="api.close()" title="Close">✕</button>
    </div>
  </div>

  <!-- ── App body ── -->
  <div id="body">

    <!-- ── Nav rail ── -->
    <nav id="rail">
      <div class="sec-label" id="railHead">XLTD VPN</div>

      <div class="railitem active" data-tab="home" onclick="switchTab('home')">
        <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        Главная
      </div>
      <div class="railitem" data-tab="profiles" onclick="switchTab('profiles')">
        <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        Профили
      </div>
      <div class="railitem" data-tab="traffic" onclick="switchTab('traffic')">
        <svg viewBox="0 0 24 24"><path d="M8 17V7m0 0L5 10m3-3l3 3M16 7v10m0 0l3-3m-3 3l-3-3"/></svg>
        Трафик
        <span class="badge" id="badgeStatus"></span>
      </div>
      <div class="railitem" data-tab="settings" onclick="switchTab('settings')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Настройки
      </div>
      <div class="railitem" data-tab="log" onclick="switchTab('log')">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10M4 18h7"/></svg>
        Лог
      </div>

      <div class="rail-spacer"></div>
      <div class="rail-footer">
        <b>SOCKS</b><br>
        <span class="socks-addr" id="railSocks">127.0.0.1:10808</span><br><br>
        <b>РЕЖИМ</b><br>
        <span id="railMode" style="color:var(--muted)">SOCKS Only</span><br><br>
        <b>CORE</b><br>
        <span id="railCore" style="color:var(--dim)">остановлен</span>
      </div>
    </nav>

    <!-- ── Page area ── -->
    <main id="main">
      <!-- injected by JS -->
    </main>
  </div><!-- #body -->
</div><!-- #app -->

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
