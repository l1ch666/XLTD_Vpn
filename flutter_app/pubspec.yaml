name: xltd_vpn
description: "XLTD VPN - olcRTC and MTS Link client"
publish_to: 'none'
version: 2.0.0+25

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Number / date formatting
  intl: ^0.19.0

  # Windows frameless window controls
  window_manager: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
